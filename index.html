<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1"
    />
    <title>Template Gallery | G.A</title>
    <link
      rel="shortcut icon"
      href="https://itsbiel.github.io/tmp-galeri/asset/img/png/b-logo.png"
      type="image/png"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://itsbiel.github.io/tmp-galeri/asset/css/biels-dkfj2ijiwsjdsa.css"
    />
    <style>
      /* === PSI score panel === */
      .psi-slot { min-height: 38px; }
      .btn-psi-check[disabled] { opacity: 0.6; cursor: wait; }
      .psi-spin { display: inline-block; animation: psiSpin 1s linear infinite; }
      @keyframes psiSpin { to { transform: rotate(360deg); } }
      .psi-panel {
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(15, 23, 42, 0.6);
        border-radius: 6px;
        padding: 10px 8px 8px;
        position: relative;
      }
      .psi-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
      .psi-tab {
        background: transparent;
        border: 1px solid rgba(148, 163, 184, 0.3);
        color: #94a3b8;
        font-size: 0.6rem;
        letter-spacing: 1px;
        padding: 2px 8px;
        border-radius: 4px;
        cursor: pointer;
      }
      .psi-tab.active {
        color: #fff;
        border-color: rgba(225, 29, 72, 0.6);
        background: rgba(225, 29, 72, 0.15);
      }
      .psi-refresh {
        position: absolute;
        top: 8px;
        right: 8px;
        background: transparent;
        border: 0;
        color: #64748b;
        cursor: pointer;
        font-size: 0.75rem;
        padding: 2px;
      }
      .psi-refresh:hover { color: #fff; }
      .psi-scores { display: flex; justify-content: space-between; gap: 4px; }
      .psi-score { text-align: center; flex: 1; }
      .psi-circle {
        width: 34px;
        height: 34px;
        margin: 0 auto 3px;
        border-radius: 50%;
        border: 2px solid;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 700;
        font-family: monospace;
      }
      .psi-circle.s-good { border-color: #0cce6b; color: #0cce6b; background: rgba(12, 206, 107, 0.08); }
      .psi-circle.s-avg { border-color: #ffa400; color: #ffa400; background: rgba(255, 164, 0, 0.08); }
      .psi-circle.s-bad { border-color: #ff4e42; color: #ff4e42; background: rgba(255, 78, 66, 0.08); }
      .psi-label {
        font-size: 0.55rem;
        letter-spacing: 1px;
        color: #94a3b8;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body class="bg-black text-white">
    <nav class="navbar navbar-expand-lg border-bottom border-secondary py-3">
      <div class="container-fluid px-4">
        <a class="navbar-brand fw-black letter-spacing-2" href="#">
          <span class="text-primary">GALLERY LP & AMP</span>
        </a>
        <div class="ms-auto d-flex align-items-center">
          <span
            class="badge bg-dark border border-secondary text-light py-2 px-3"
          >
            <span class="system-status-dot me-2"></span>SYSTEM_ONLINE
          </span>
        </div>
      </div>
    </nav>

    <main class="container-fluid p-4">
      <div class="search-container mb-5">
        <div class="row align-items-center g-3">
          <div class="col-md-4">
            <div class="input-group search-wrapper">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input
                type="text"
                id="search-input"
                class="form-control"
                placeholder="SEARCH_DATABASE..."
                autocomplete="off"
              />
            </div>
          </div>
          <div class="col-md-8 text-md-end">
            <div
              class="filter-group d-flex gap-2 justify-content-md-end flex-wrap"
            >
              <button class="filter-btn active" data-filter="ALL">ALL</button>
              <button class="filter-btn" data-filter="TOGEL">TOGEL</button>
              <button class="filter-btn" data-filter="SLOT">SLOT</button>
              <button class="filter-btn" data-filter="AMP">AMP</button>
            </div>
          </div>
        </div>
      </div>

      <div id="project-grid" class="row g-4"></div>

      <div id="load-more-container" class="col-12 text-center mt-5 mb-5 d-none">
        <button
          id="btn-load-more"
          class="filter-btn py-3 px-5  text-danger"
          style="
            border: 1px solid rgba(225, 29, 72, 0.4);
            background: rgba(15, 23, 42, 0.8);
          "
        >
          <i class="bi bi-arrow-clockwise me-2"></i>Muat Lagi
        </button>
      </div>
    </main>

    <footer class="simple-footer">
      <div class="container-fluid px-4">
        <div class="footer-wrap">
          <div class="footer-section">
            <span class="system-status-dot"></span>
            <span id="footer-date" class="footer-meta">2026-04-16</span>
          </div>
          <div class="footer-copyright d-none d-lg-block">
            COPYRIGHT © 2026 <span class="text-white">| [BIEL]</span>
          </div>
          <div class="footer-section">
            <span id="footer-clock" class="footer-clock">00:00:00</span>
          </div>
        </div>
      </div>
    </footer>

    <div id="preview-modal" class="terminal-modal">
      <div class="modal-backdrop-blur"></div>
      <div class="modal-content-wrapper">
        <div class="modal-toolbar">
          <div class="toolbar-left">
            <span class="status-dot blink"></span>
            <span id="modal-project-name">PROJECT_PREVIEW</span>
          </div>
          <div class="toolbar-right">
            <div class="view-toggle">
              <button class="modal-ctrl-btn view-btn active" data-view="desktop" title="Tampilan Desktop">
                <i class="bi bi-display"></i>
              </button>
              <button class="modal-ctrl-btn view-btn" data-view="mobile" title="Tampilan Mobile">
                <i class="bi bi-phone"></i>
              </button>
            </div>
            <button class="modal-ctrl-btn" id="close-modal">
              <i class="bi bi-x-lg"></i> CLOSE_ESC
            </button>
          </div>
        </div>
        <div class="modal-body-frame">
          <iframe id="fullscreen-iframe" src=""></iframe>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://itsbiel.github.io/tmp-galeri/asset/js/biel-dkfj2ijiwsjdsa.js"></script>
    <script>
      // 1. Toast & Copy Functions
      function showToast(message) {
        $(".terminal-toast").remove();
        const toastHtml = `<div class="terminal-toast"><div class="terminal-toast-msg"><div class="terminal-toast-title">SYSTEM_NOTIFICATION</div><div class="terminal-toast-content">${message}</div></div></div>`;
        $("body").append($(toastHtml));
        setTimeout(() => $(".terminal-toast").addClass("show"), 100);
        setTimeout(() => {
          $(".terminal-toast").removeClass("show");
          setTimeout(() => $(".terminal-toast").remove(), 400);
        }, 3000);
      }

      window.copyToClipboard = function (text) {
        navigator.clipboard
          .writeText(text)
          .then(() => showToast("LINK_COPIED"))
          .catch(() => showToast("COPY_FAILED"));
      };

      // === PSI (PageSpeed Insights) ===
      const PSI_API_KEY = "AIzaSyCUaCnRsCRiRUzVkp-RkOjEM9CgGb9PCd0"; // opsional: isi API key Google Cloud utk kuota lebih besar
      const PSI_TTL_MS = 7 * 24 * 60 * 60 * 1000; // 7 hari
      const PSI_CATS = [
        ["perf", "performance", "PERF"],
        ["a11y", "accessibility", "A11Y"],
        ["best", "best-practices", "BEST"],
        ["seo", "seo", "SEO"],
      ];

      function psiCacheGet(url) {
        try {
          const raw = localStorage.getItem("psi_score::" + url);
          if (!raw) return null;
          const data = JSON.parse(raw);
          if (!data.mobile || !data.desktop) return null;
          if (Date.now() - data.ts > PSI_TTL_MS) return null;
          return data;
        } catch (e) {
          return null;
        }
      }

      function psiCacheSet(url, data) {
        try {
          localStorage.setItem("psi_score::" + url, JSON.stringify(data));
        } catch (e) {
          /* storage penuh/di-block: abaikan, panel tetap tampil sesi ini */
        }
      }

      function psiScoreClass(score) {
        if (score >= 90) return "s-good";
        if (score >= 50) return "s-avg";
        return "s-bad";
      }

      function buildPsiButton() {
        return '<button class="btn-action w-100 btn-psi-check"><i class="bi bi-speedometer2 me-2"></i>CHECK SCORE</button>';
      }

      function buildPsiLoading() {
        return '<button class="btn-action w-100 btn-psi-check" disabled><i class="bi bi-arrow-repeat me-2 psi-spin"></i>SCANNING...</button>';
      }

      function buildPsiPanel(data, view) {
        const scores = data[view];
        const circles = PSI_CATS.map(
          ([key, , label]) =>
            '<div class="psi-score"><div class="psi-circle ' +
            psiScoreClass(scores[key]) +
            '">' +
            scores[key] +
            '</div><div class="psi-label">' +
            label +
            "</div></div>",
        ).join("");
        return (
          '<div class="psi-panel">' +
          '<button class="psi-refresh" title="Cek ulang"><i class="bi bi-arrow-clockwise"></i></button>' +
          '<div class="psi-tabs">' +
          '<button class="psi-tab' + (view === "mobile" ? " active" : "") + '" data-psi-view="mobile">MOBILE</button>' +
          '<button class="psi-tab' + (view === "desktop" ? " active" : "") + '" data-psi-view="desktop">DESKTOP</button>' +
          "</div>" +
          '<div class="psi-scores">' + circles + "</div>" +
          "</div>"
        );
      }

      function renderPsiSlot(url) {
        const cached = psiCacheGet(url);
        return cached ? buildPsiPanel(cached, "mobile") : buildPsiButton();
      }

      function fetchPsiStrategy(url, strategy) {
        const params = new URLSearchParams({ url: url, strategy: strategy });
        PSI_CATS.forEach(([, id]) =>
          params.append("category", id.toUpperCase().replace("-", "_")),
        );
        if (PSI_API_KEY) params.append("key", PSI_API_KEY);
        return fetch(
          "https://www.googleapis.com/pagespeedonline/v5/runPagespeed?" + params,
        ).then((res) => {
          if (res.status === 429 || res.status === 403) throw new Error("RATE_LIMITED");
          if (!res.ok) throw new Error("HTTP_" + res.status);
          return res.json().then((json) => {
            const cats = json.lighthouseResult && json.lighthouseResult.categories;
            if (!cats) throw new Error("NO_RESULT");
            const out = {};
            PSI_CATS.forEach(([key, id]) => {
              out[key] = Math.round((cats[id].score || 0) * 100);
            });
            return out;
          });
        });
      }

      function runPsiCheck($slot) {
        const url = $slot.data("url");
        $slot.html(buildPsiLoading());
        Promise.all([
          fetchPsiStrategy(url, "mobile"),
          fetchPsiStrategy(url, "desktop"),
        ])
          .then(([mobile, desktop]) => {
            const data = { mobile: mobile, desktop: desktop, ts: Date.now() };
            psiCacheSet(url, data);
            // update SEMUA slot dgn url sama (card bisa dirender > 1x)
            $('.psi-slot[data-url="' + url + '"]').html(buildPsiPanel(data, "mobile"));
          })
          .catch((err) => {
            showToast(
              err.message === "RATE_LIMITED"
                ? "RATE_LIMITED // coba lagi nanti"
                : "SCAN_FAILED // coba lagi nanti",
            );
            $slot.html(buildPsiButton());
          });
      }

      $(document).on("click", ".btn-psi-check:not([disabled])", function () {
        runPsiCheck($(this).closest(".psi-slot"));
      });

      $(document).on("click", ".psi-refresh", function () {
        runPsiCheck($(this).closest(".psi-slot"));
      });

      $(document).on("click", ".psi-tab", function () {
        const $slot = $(this).closest(".psi-slot");
        const cached = psiCacheGet($slot.data("url"));
        if (!cached) {
          $slot.html(buildPsiButton());
          return;
        }
        $slot.html(buildPsiPanel(cached, $(this).data("psi-view")));
      });

      $(document).ready(function () {
        let currentSearchTerm = "";
        let currentNicheFilter = "ALL";
        let visibleItems = 8;
        let filteredData = [];

        // Cache selektor sekali (tidak di-query ulang tiap render)
        const $grid = $("#project-grid");
        const $loadMoreCont = $("#load-more-container");

        window.downloadAsset = function (url, filename) {
          const link = document.createElement("a");
          link.href = url;
          link.setAttribute(
            "download",
            filename.replace(/\s+/g, "_").toUpperCase() + ".html",
          );
          link.target = "_blank";
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        };

        window.openPreview = function (url, name, niche) {
          $("#modal-project-name").text(name.toUpperCase());
          $("#fullscreen-iframe").attr("src", url);
          // AMP -> mulai dari tampilan mobile, selain itu desktop
          const view = (niche || "").toUpperCase() === "AMP" ? "mobile" : "desktop";
          $(".modal-body-frame").toggleClass("mobile-view", view === "mobile");
          $(".view-btn").removeClass("active");
          $('.view-btn[data-view="' + view + '"]').addClass("active");
          $("#preview-modal").addClass("active");
          $("body").css("overflow", "hidden");
        };

        // Toggle tampilan Desktop / Mobile di dalam modal
        $(document).on("click", ".view-btn", function () {
          $(".view-btn").removeClass("active");
          $(this).addClass("active");
          $(".modal-body-frame").toggleClass(
            "mobile-view",
            $(this).data("view") === "mobile",
          );
        });

        $("#close-modal").on("click", function () {
          $("#preview-modal").removeClass("active");
          $("#fullscreen-iframe").attr("src", "");
          $("body").css("overflow", "auto");
        });

        function renderCards(isLoadMore = false) {
          if (!isLoadMore) $grid.empty();

          const startIndex = isLoadMore ? $(".review-card").length : 0;
          const displayData = filteredData.slice(startIndex, visibleItems);

          if (filteredData.length === 0) {
            $grid.html(
              '<div class="col-12 text-center py-5 text-secondary">' +
                '<i class="bi bi-database-x d-block mb-3" style="font-size:2.5rem;opacity:.5"></i>' +
                '<div class="fw-bold text-primary" style="letter-spacing:2px">NO_ASSETS_FOUND</div>' +
                '<div class="small mt-2" style="opacity:.6">// coba ubah kata kunci atau filter</div>' +
              "</div>",
            );
            $loadMoreCont.addClass("d-none");
            return;
          }

          // Bangun semua kartu jadi satu string, lalu append SEKALI (1x reflow)
          const cardsHtml = displayData
            .map((item) => {
              const nicheClass = `card-niche-${item.niche.toLowerCase()}`;
              // Selalu ambil dari GitHub, bukan dari file lokal
              const fullUrl = `https://itsbiel.github.io/tmp-galeri/${item.url}`;
              // Thumbnail via WordPress mShots (gratis, tanpa akun)
              const thumbUrl = `https://s.wordpress.com/mshots/v1/${encodeURIComponent(fullUrl)}?w=600&h=400`;
              return `
              <div class="col-12 col-sm-6 col-md-4 col-lg-3 d-flex animate-in">
                <div class="review-card w-100 ${nicheClass}">
                  <div class="niche-tag">${item.niche}</div>
                  <div class="thema-tag">${item.thema}</div>
                  <div class="preview-window" onclick="openPreview('${fullUrl}', '${item.name}', '${item.niche}')">
                    <div class="preview-loader"></div>
                    <img class="preview-img" src="${thumbUrl}" loading="lazy" alt="${item.name}" />
                    <div class="preview-overlay"><span class="preview-btn">[ PREVIEW ]</span></div>
                  </div>
                  <div class="card-body">
                    <div class="item-name text-truncate">${item.name}</div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                      <div class="item-type-label">${item.type}</div>
                      <div class="item-date-label">${item.date}</div>
                    </div>
                    <div class="card-actions d-flex flex-column gap-2">
                      <div class="d-flex gap-2">
                        <button onclick="openPreview('${fullUrl}', '${item.name}', '${item.niche}')" class="btn-action btn-main flex-grow-1">PREVIEW</button>
                        <button onclick="copyToClipboard('${fullUrl}')" class="btn-action px-3"><i class="bi bi-link-45deg"></i></button>
                      </div>
                      <button onclick="downloadAsset('${fullUrl}', '${item.name}')" class="btn-action w-100">
                          <i class="bi bi-download me-2"></i> DOWNLOAD HTML
                      </button>
                      <div class="psi-slot" data-url="${fullUrl}">${renderPsiSlot(fullUrl)}</div>
                    </div>
                  </div>
                </div>
              </div>`;
            })
            .join("");

          $grid.append(cardsHtml);
          setupThumbs();

          $loadMoreCont.toggleClass(
            "d-none",
            visibleItems >= filteredData.length,
          );
        }

        // mShots membalas gambar "loading" (logo WordPress) dulu, lalu screenshot
        // asli siap beberapa detik kemudian. Kita sembunyikan gambar di balik spinner
        // sendiri & baru tampilkan saat screenshot asli siap (lebar ~600px sesuai
        // permintaan; placeholder loading-nya lebih kecil).
        function setupThumbs() {
          $(".preview-img").each(function () {
            if (this.dataset.init) return; // setup sekali per gambar
            this.dataset.init = "1";
            const img = this;
            const base = img.src;
            let attempt = 0;
            const MAX = 6;

            const reveal = () => {
              img.classList.add("loaded");
              const loader = img.parentNode.querySelector(".preview-loader");
              if (loader) loader.style.display = "none";
            };
            const reload = () => {
              if (attempt >= MAX) {
                reveal(); // fallback: tampilkan apa adanya agar tidak macet di spinner
                return;
              }
              attempt++;
              setTimeout(() => {
                img.src = base + "&retry=" + attempt;
              }, 3000);
            };
            const onLoad = () => {
              if (img.naturalWidth >= 550) reveal(); // screenshot asli sudah siap
              else reload(); // masih placeholder -> coba lagi, spinner tetap tampil
            };

            img.addEventListener("load", onLoad);
            img.addEventListener("error", reload);
            // jika sudah selesai dimuat sebelum listener terpasang (dari cache)
            if (img.complete && img.naturalWidth) onLoad();
          });
        }

        function applyFilters() {
          visibleItems = 8;
          filteredData = pageData
            .filter((item) => {
              const matchesSearch =
                item.name
                  .toLowerCase()
                  .includes(currentSearchTerm.toLowerCase()) ||
                item.thema
                  .toLowerCase()
                  .includes(currentSearchTerm.toLowerCase());
              const matchesNiche =
                currentNicheFilter === "ALL" ||
                item.niche.toUpperCase() === currentNicheFilter;
              return matchesSearch && matchesNiche;
            })
            .sort((a, b) => new Date(b.date) - new Date(a.date));
          renderCards(false);
        }

        $("#btn-load-more").on("click", function () {
          visibleItems += 8;
          renderCards(true);
        });

        $("#search-input").on("input", function () {
          currentSearchTerm = $(this).val();
          applyFilters();
        });
        $(document).on("click", ".filter-btn:not(#btn-load-more)", function () {
          $(".filter-btn").removeClass("active");
          $(this).addClass("active");
          currentNicheFilter = $(this).data("filter");
          applyFilters();
        });

        applyFilters();
      });

       // System Clock
        function updateTime() {
          const now = new Date();
          $("#footer-clock").text(now.toTimeString().split(" ")[0]);
          $("#footer-date").text(now.toISOString().split("T")[0]);
        }

        updateTime();
        setInterval(updateTime, 1000);
    </script>
  </body>
</html>
