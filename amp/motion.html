<!doctype html>
<html ⚡ lang="id-ID">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1" />
    <link rel="canonical" href="https://koitoto.example/motion" />
    <link rel="preload" as="image" href="https://imgmahasuhu.io/images/2026/04/06/link-slot777-gampang.png" />
    <link rel="preload" as="image" href="https://imgmahasuhu.io/images/2026/05/23/logooo.gif" />
    <link rel="preload" as="image" href="https://imagekoi.io/images/2026/02/26/koi-panjang-2026-ezgif.com-speed.webp" />
    <title>KOITOTO — Motion</title>
    <script async src="https://cdn.ampproject.org/v0.js"></script>

    <script async custom-element="amp-animation"
      src="https://cdn.ampproject.org/v0/amp-animation-0.1.js"></script>
    <script async custom-element="amp-anim"
      src="https://cdn.ampproject.org/v0/amp-anim-0.1.js"></script>

    <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style>
    <noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>

    <style amp-custom>
      :root{ --gold:#ff3b3b; --gold2:#c40000; --ink:#0a0405; }
      *{ box-sizing:border-box; }
      html,body{ margin:0; height:100%; background:var(--ink); color:#fff;
        font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; overflow:hidden; }

      /* ====== HERO (satu layar penuh) ====== */
      .hero{ position:relative; height:100vh; min-height:520px; overflow:hidden;
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        background:
          radial-gradient(60% 50% at 50% 30%, rgba(255,40,40,.30), transparent 70%),
          radial-gradient(90% 60% at 50% 120%, rgba(150,0,0,.45), transparent 70%),
          #0a0405; }

      /* glow berdenyut */
      .glow{ position:absolute; top:20%; left:50%; width:420px; height:420px;
        margin-left:-210px; border-radius:50%; pointer-events:none;
        background:radial-gradient(circle, rgba(255,60,60,.55), transparent 62%);
        filter:blur(6px); animation:pulse 3.4s ease-in-out infinite; }
      @keyframes pulse{ 0%,100%{ transform:scale(.85); opacity:.55 }
        50%{ transform:scale(1.12); opacity:.9 } }

      /* koin mengambang */
      .coin{ position:absolute; width:52px; height:52px; opacity:.9;
        filter:drop-shadow(0 6px 14px rgba(255,40,40,.55)); }
      .c1{ top:12%; left:3%; animation:floatY 5s ease-in-out infinite; }
      .c2{ top:20%; left:86%; width:40px; height:40px; animation:floatY 6.5s ease-in-out infinite .6s; }
      .c3{ top:40%; left:2%; width:34px; height:34px; animation:floatY 7.5s ease-in-out infinite 1.1s; }
      .c4{ top:34%; left:88%; width:30px; height:30px; animation:floatY 6s ease-in-out infinite .3s; }
      @keyframes floatY{ 0%,100%{ transform:translateY(0) rotate(-6deg) }
        50%{ transform:translateY(-22px) rotate(6deg) } }

      /* brand sebagai header, dipatok di paling atas */
      .brand{ position:absolute; top:18px; left:0; right:0; z-index:5;
        display:block; width:min(200px,55vw); margin:0 auto; opacity:0;
        filter:drop-shadow(0 4px 14px rgba(0,0,0,.5)); }
      .brand amp-anim{ display:block; }

      .logo{ position:relative; z-index:3; display:block; width:min(340px,80vw);
        transform-origin:center; opacity:0;
        filter:drop-shadow(0 0 24px rgba(255,50,50,.6)); }
      .logo amp-img{ display:block; }

      .title{ position:relative; z-index:3; margin:22px 0 6px; text-align:center;
        font-size:clamp(30px,9vw,54px); font-weight:900; letter-spacing:2px; line-height:1;
        background:linear-gradient(180deg,#fff, var(--gold) 60%, var(--gold2));
        -webkit-background-clip:text; background-clip:text; color:transparent; opacity:0; }
      .sub{ position:relative; z-index:3; text-align:center; color:#cbb98a;
        letter-spacing:4px; font-size:13px; text-transform:uppercase; opacity:0; }

      /* shine menyapu title */
      .shine{ position:relative; overflow:hidden; }
      .shine::after{ content:""; position:absolute; inset:0;
        background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.55) 50%,transparent 70%);
        transform:translateX(-120%); animation:shine 3.2s ease-in-out infinite 1s; }
      @keyframes shine{ 0%{ transform:translateX(-120%) } 60%,100%{ transform:translateX(120%) } }

      .cta{ position:relative; z-index:3; display:block; width:min(280px,80vw);
        margin:34px auto 0; text-align:center; padding:16px 22px; border-radius:999px;
        font-weight:800; letter-spacing:1.5px; text-decoration:none; color:#fff;
        background:linear-gradient(180deg,var(--gold),var(--gold2));
        box-shadow:0 10px 30px rgba(255,40,40,.45), inset 0 1px 0 rgba(255,255,255,.35);
        overflow:hidden; opacity:0;
        animation:breathe 2.6s ease-in-out infinite; }
      @keyframes breathe{ 0%,100%{ transform:scale(1) } 50%{ transform:scale(1.045) } }

      /* kilau menyapu melintasi tombol */
      .cta::after{ content:""; position:absolute; inset:0; pointer-events:none;
        background:linear-gradient(115deg, transparent 32%, rgba(255,255,255,.55) 50%, transparent 68%);
        transform:translateX(-130%);
        animation:sweep 2.8s ease-in-out infinite 1s; }
      @keyframes sweep{ 0%{ transform:translateX(-130%) } 55%,100%{ transform:translateX(130%) } }

      .cta.login{ margin-top:14px; }
      .cta.login::after{ animation-delay:1.9s; }

      .spec{ position:relative; z-index:3; width:min(380px,88vw);
        margin:22px auto 0; border-collapse:collapse; font-size:12px; opacity:0;
        background:rgba(255,255,255,.03); border:1px solid rgba(255,60,60,.25);
        border-radius:10px; overflow:hidden; }
      .spec td{ padding:8px 12px; border-bottom:1px solid rgba(255,255,255,.08); }
      .spec tr:last-child td{ border-bottom:none; }
      .spec td:first-child{ color:rgba(255,255,255,.55); white-space:nowrap; }
      .spec td:last-child{ text-align:right; color:#fff; font-weight:700; }

      .koi{ position:relative; z-index:3; width:min(400px,90vw);
        margin:16px auto 0; opacity:0; }
      .koi amp-img{ display:block; }

      .foot{ position:absolute; bottom:14px; left:0; right:0; z-index:3;
        text-align:center; font-size:12px; letter-spacing:.5px; color:rgba(255,255,255,.5); }
    </style>
  </head>

  <body>

    <section class="hero">
      <div class="glow"></div>

      <!-- koin dekoratif -->
      <svg class="coin c1" viewBox="0 0 64 64"><defs><radialGradient id="g" cx="40%" cy="35%"><stop offset="0" stop-color="#ffe89a"/><stop offset="1" stop-color="#e08a00"/></radialGradient></defs><circle cx="32" cy="32" r="30" fill="url(#g)" stroke="#a85f00" stroke-width="3"/><text x="32" y="41" font-size="20" text-anchor="middle" fill="#8a4b00" font-weight="900">RP</text></svg>
      <svg class="coin c2" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="url(#g)" stroke="#a85f00" stroke-width="3"/><text x="32" y="41" font-size="20" text-anchor="middle" fill="#8a4b00" font-weight="900">RP</text></svg>
      <svg class="coin c3" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="url(#g)" stroke="#a85f00" stroke-width="3"/><text x="32" y="41" font-size="20" text-anchor="middle" fill="#8a4b00" font-weight="900">RP</text></svg>
      <svg class="coin c4" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="url(#g)" stroke="#a85f00" stroke-width="3"/><text x="32" y="41" font-size="20" text-anchor="middle" fill="#8a4b00" font-weight="900">RP</text></svg>

      <!-- brand logo (gif animasi) -->
      <div id="brand" class="brand">
        <amp-anim
          src="https://imgmahasuhu.io/images/2026/05/23/logooo.gif"
          width="500" height="125" layout="responsive" alt="Logo"></amp-anim>
      </div>

      <!-- gambar utama: naik dari bawah -->
      <div id="logo" class="logo">
        <amp-img
          src="https://imgmahasuhu.io/images/2026/04/06/link-slot777-gampang.png"
          width="340" height="340" layout="responsive" alt="KOITOTO"></amp-img>
      </div>

      <a class="cta" href="#">DAFTAR</a>
      <a class="cta login" href="#">LOGIN</a>

      <table class="spec">
        <tr><td>Brand Gacor</td><td>KOITOTO</td></tr>
        <tr><td>Minimal Deposit</td><td>10,000 IDR</td></tr>
        <tr><td>Minimal Withdraw</td><td>35,000 IDR</td></tr>
        <tr><td>BANK ONLINE</td><td>💳 AllBank - E-Wallet - SCAN QRIS</td></tr>
        <tr><td>Rating Situs</td><td>⭐⭐⭐⭐⭐</td></tr>
      </table>

      <div id="koi" class="koi">
        <amp-img
          src="https://imagekoi.io/images/2026/02/26/koi-panjang-2026-ezgif.com-speed.webp"
          width="840" height="112" layout="responsive" alt="Koi"></amp-img>
      </div>

      <amp-animation id="intro" layout="nodisplay" trigger="visibility">
        <script type="application/json">
        {
          "duration": "1000ms",
          "easing": "cubic-bezier(.2,.9,.2,1)",
          "fill": "both",
          "animations": [
            { "selector": "#brand", "delay": "0ms",
              "keyframes": [
                { "opacity": 0, "transform": "translateY(-16px)" },
                { "opacity": 1, "transform": "translateY(0)" } ] },
            { "selector": ".cta:not(.login)", "delay": "200ms",
              "keyframes": [
                { "opacity": 0, "transform": "translateY(20px)" },
                { "opacity": 1, "transform": "translateY(0)" } ] },
            { "selector": ".login", "delay": "350ms",
              "keyframes": [
                { "opacity": 0, "transform": "translateY(20px)" },
                { "opacity": 1, "transform": "translateY(0)" } ] },
            { "selector": "#logo", "delay": "600ms",
              "keyframes": [
                { "opacity": 0, "transform": "translateY(120px)" },
                { "opacity": 1, "transform": "translateY(0)" } ] },
            { "selector": ".spec", "delay": "900ms",
              "keyframes": [ { "opacity": 0 }, { "opacity": 1 } ] },
            { "selector": "#koi", "delay": "1100ms",
              "keyframes": [ { "opacity": 0 }, { "opacity": 1 } ] }
          ]
        }
        </script>
      </amp-animation>

      <footer class="foot">© 2026 KOITOTO. All rights reserved.</footer>

    </section>

  </body>
</html>
