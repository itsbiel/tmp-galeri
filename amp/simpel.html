    <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style><noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>
    <style amp-custom>
      *{box-sizing:border-box;}
      html,body{margin:0;padding:0;}
      body{background:#000;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Courier New",monospace;overflow-x:hidden;}

      /* ===== Stage background ===== */
      .stage{position:fixed;inset:0;z-index:-1;overflow:hidden;background:radial-gradient(circle at center,#2c2c2c 0%,#000 100%);}
      .dust{position:absolute;width:100%;height:100%;opacity:.10;background-image:radial-gradient(#fff 1px,transparent 1px);background-size:50px 50px;animation:dustFly 20s linear infinite;}
      .beam{position:absolute;top:-20%;width:300px;height:150%;clip-path:polygon(50% 0%,0% 100%,100% 100%);filter:blur(30px);opacity:.6;transform-origin:top;background:linear-gradient(to bottom,rgba(255,0,0,.2),transparent);animation:beamMove 8s infinite alternate ease-in-out;}
      .beam.left{left:-10%;}
      .beam.right{right:-10%;animation-delay:-4s;}

      /* ===== Layout ===== */
      .container{margin:0 auto;max-width:500px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;}
      .container>*+*{margin-top:24px;}

      .card{width:100%;background:rgba(26,26,26,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,0,0,.2);border-radius:24px;padding:40px;box-shadow:0 20px 50px rgba(0,0,0,.5);}
      .card>*+*{margin-top:24px;}

      /* ===== Logo ===== */
      .header{width:100%;}
      .logo{filter:drop-shadow(0 0 15px rgba(255,0,0,.5));animation:tada 2s infinite;}

      /* ===== Welcome ===== */
      .welcome{text-align:center;}
      .welcome h1{margin:0;font-weight:800;font-size:1.125rem;line-height:1.3;background:linear-gradient(to right,#8b0000,#ff0000,#8b0000);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;filter:drop-shadow(0 5px 15px rgba(255,0,0,.2));}

      /* ===== Banner ===== */
      .banner{width:100%;}
      .banner amp-img{border-radius:16px;border:1px solid rgba(255,0,0,.2);box-shadow:0 0 30px rgba(0,0,0,.8),0 0 15px rgba(255,0,0,.3);overflow:hidden;transition:transform .5s,box-shadow .5s;}
      .banner:hover amp-img{transform:scale(1.02);box-shadow:0 0 40px rgba(255,0,0,.5);}

      /* ===== Buttons ===== */
      .actions{width:100%;}
      .actions>*+*{margin-top:16px;}
      .btn-premium{position:relative;display:block;width:100%;padding:16px 0;text-align:center;font-weight:900;font-size:1.125rem;color:#fff;text-decoration:none;background:linear-gradient(145deg,#3a0c0c 0%,#1c0303 100%);border-radius:50px;z-index:0;overflow:hidden;border:none;transition:transform .2s,box-shadow .2s;}
      .btn-premium::before{content:"";position:absolute;top:50%;left:50%;width:150%;height:0;padding-bottom:150%;background:conic-gradient(transparent 70%,#ff0000,#8b0000,#ff0000);transform:translate(-50%,-50%);animation:rotate-border 3s linear infinite;z-index:-2;}
      .btn-premium::after{content:"";position:absolute;inset:2px;background:linear-gradient(145deg,#3a0c0c 0%,#1c0303 100%);border-radius:50px;z-index:-1;}
      .btn-premium span{position:relative;z-index:10;transition:color .2s;}
      .btn-premium:hover{transform:translateY(-4px);box-shadow:0 8px 25px rgba(255,0,0,.4);}
      .btn-premium:hover span{color:#ff0000;}

      /* ===== Footer ===== */
      .footer{text-align:center;padding-top:32px;}
      .footer p{margin:0;color:rgba(255,255,255,.5);font-size:.875rem;}

      @media (min-width:768px){.welcome h1{font-size:1.25rem;}}

      @keyframes dustFly{from{transform:translateY(0);}to{transform:translateY(-1000px);}}
      @keyframes beamMove{from{transform:rotate(-15deg);}to{transform:rotate(15deg);}}
      @keyframes tada{0%{transform:scale(1);}10%,20%{transform:scale(.9) rotate(-3deg);}30%,50%,70%,90%{transform:scale(1.1) rotate(3deg);}40%,60%,80%{transform:scale(1.1) rotate(-3deg);}100%{transform:scale(1) rotate(0);}}
      @keyframes rotate-border{from{transform:translate(-50%,-50%) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg);}}
    </style>
  </head>
  <body>
    <!-- Stage Background -->
    <div class="stage">
      <div class="dust"></div>
      <div class="beam left"></div>
      <div class="beam right"></div>
    </div>

    <div class="container">
      <!-- Glassmorphism Card -->
      <div class="card">
        <!-- Logo -->
        <header class="header">
          <amp-img class="logo" src="https://koi.sgp1.digitaloceanspaces.com/Logo_koi/Logo-PNg.png" width="3979" height="979" layout="responsive" alt="KOITOTO"></amp-img>
        </header>
        <!-- Welcome Text -->
        <div class="welcome">
          <h1>SITUS RESMI BANDAR TOGEL</h1>
        </div>
        <!-- Banner Image -->
        <div class="banner">
          <amp-img src="https://imgmahasuhu.io/images/2026/06/17/pusat-agen-20.jpeg" width="600" height="600" layout="responsive" alt="KOITOTO Resmi"></amp-img>
        </div>
        <!-- Action Buttons -->
        <div class="actions">
          <a class="btn-premium" href="https://mikale.me/login-koitoto" rel="noreferrer noopener"><span>LOGIN</span></a>
          <a class="btn-premium" href="https://mikale.me/login-koitoto" rel="noreferrer noopener"><span>DAFTAR</span></a>
          <a class="btn-premium" href="https://mikale.me/login-koitoto" rel="noreferrer noopener"><span>LIVECHAT</span></a>
        </div>
      </div>

      <!-- Footer -->
      <footer class="footer">
        <p>Copyright © KOITOTO</p>
      </footer>
    </div>
  </body>
</html>
